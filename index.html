<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunflower</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    body {
      position: fixed; inset: 0;
      transition: background 4s ease;
    }

    /* ── Celestial (sun or moon) ── */
    #celestial {
      position: absolute;
      pointer-events: none;
      transition: left 55s linear, top 55s linear, opacity 2s ease;
      z-index: 2;
    }

    /* ── Stars ── */
    #stars {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 68%;
      pointer-events: none; z-index: 1;
      opacity: 0; transition: opacity 3s ease;
    }

    /* ── Clouds ── */
    .cloud {
      position: absolute;
      pointer-events: none;
      transition: opacity 3s ease; z-index: 2;
    }
    @keyframes cf1 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(22px)} }
    @keyframes cf2 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-16px)} }
    @keyframes cf3 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(12px)} }
    #c1 { animation: cf1 30s ease-in-out infinite; }
    #c2 { animation: cf2 24s ease-in-out infinite 4s; }
    #c3 { animation: cf3 38s ease-in-out infinite 10s; }

    /* ── Horizon glow ── */
    #horizonGlow {
      position: absolute; bottom: 26%; left: 0;
      width: 100%; height: 240px;
      pointer-events: none; z-index: 2;
      transition: background 4s ease, opacity 3s ease;
    }

    /* ── Milky Way ── */
    #milkyWay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 68%;
      pointer-events: none; z-index: 1;
      opacity: 0; transition: opacity 5s ease;
    }

    /* ── Distant hills ── */
    .hills {
      position: absolute; bottom: 27.5%; left: -5%;
      width: 110%; height: 13%;
      background: linear-gradient(180deg,
        transparent 0%, rgba(30,60,22,0.55) 55%, rgba(22,48,16,0.80) 100%);
      border-radius: 70% 55% 0 0 / 100% 100% 0 0;
      z-index: 2;
    }
    .hills::before {
      content: ''; position: absolute;
      right: -2%; bottom: 0; width: 55%; height: 80%;
      background: linear-gradient(180deg,
        transparent 0%, rgba(28,55,20,0.50) 55%, rgba(20,44,14,0.75) 100%);
      border-radius: 80% 65% 0 0 / 100% 100% 0 0;
    }

    /* ── Meadow ── */
    .meadow {
      position: absolute; bottom: 0; left: -6%;
      width: 112%; height: 28%;
      background: linear-gradient(180deg,
        #58b844 0%, #44962e 28%, #306820 58%, #1e4812 80%, #112a0a 100%);
      border-radius: 70% 70% 0 0; z-index: 3;
    }

    /* ── Grass fringe ── */
    .grass-fringe {
      position: absolute; bottom: 27.5%; left: 0;
      width: 100%; height: 30px;
      overflow: hidden; pointer-events: none; z-index: 4;
    }
    .grass-fringe::before {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 100%; height: 30px;
      background: repeating-linear-gradient(90deg,
        #5ecf4a 0px,#5ecf4a 3px,#3ca82a 3px,#3ca82a 6px,
        #70d85c 6px,#70d85c 9px,#48b836 9px,#48b836 12px);
      clip-path: polygon(
        0 100%,1% 10%,2% 100%,3.5% 0%,5% 100%,6.5% 20%,8% 100%,9% 5%,10.5% 100%,12% 25%,
        13.5% 100%,15% 0%,16.5% 100%,18% 15%,19.5% 100%,21% 8%,22.5% 100%,24% 30%,
        25.5% 100%,27% 0%,28.5% 100%,30% 18%,31.5% 100%,33% 5%,34.5% 100%,36% 22%,
        37.5% 100%,39% 10%,40.5% 100%,42% 28%,43.5% 100%,45% 2%,46.5% 100%,48% 18%,
        49.5% 100%,51% 8%,52.5% 100%,54% 24%,55.5% 100%,57% 0%,58.5% 100%,60% 14%,
        61.5% 100%,63% 6%,64.5% 100%,66% 20%,67.5% 100%,69% 4%,70.5% 100%,72% 26%,
        73.5% 100%,75% 10%,76.5% 100%,78% 2%,79.5% 100%,81% 18%,82.5% 100%,84% 8%,
        85.5% 100%,87% 22%,88.5% 100%,90% 5%,91.5% 100%,93% 16%,94.5% 100%,
        96% 0%,97.5% 100%,99% 12%,100% 100%);
    }

    /* ── Flower pivot — handles health droop ── */
    #flowerPivot {
      position: absolute; bottom: 27%; left: 50%;
      transform: translateX(-50%);
      transform-origin: bottom center;
      transition: transform 3s ease;
      z-index: 5;
    }
    /* ── Flower — wind sway on top of droop ── */
    .flower-wrap {
      transform-origin: bottom center;
      animation: windSway 2.6s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
      transition: animation-duration 2s ease;
    }
    @keyframes windSway {
      0%  {transform: rotate(-4.5deg)}
      22% {transform: rotate(3deg)}
      45% {transform: rotate(-1.8deg)}
      68% {transform: rotate(4deg)}
      85% {transform: rotate(-2deg)}
      100%{transform: rotate(-4.5deg)}
    }
    /* Sunflower with transparent background */
    .sf-photo {
      display: block;
      width: 320px;
      height: 320px;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.30));
    }

    /* ── Mini shower ── */
    @keyframes fall {
      0%  {transform:translate(0,0) rotate(0deg) scale(1);opacity:1}
      15% {opacity:1}
      100%{transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(0.25);opacity:0}
    }
    .mini-f {
      position: fixed; pointer-events: none; z-index: 999;
      will-change: transform,opacity;
      animation: fall var(--dur) cubic-bezier(0.3,0,0.8,1) forwards;
    }

    /* ── "Miss you" text float ── */
    @keyframes floatUp {
      0%   {transform:translate(0,0) rotate(var(--dr)) scale(1); opacity:0}
      12%  {opacity:1}
      82%  {opacity:0.88}
      100% {transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(0.88); opacity:0}
    }
    .miss-text {
      position: fixed; pointer-events: none; z-index: 999;
      will-change: transform, opacity;
      animation: floatUp var(--dur) ease-out forwards;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      font-style: italic;
      color: rgba(255,215,232,0.95);
      text-shadow:
        0 0 8px  rgba(255,160,200,0.60),
        0 0 22px rgba(255,110,170,0.28);
      white-space: nowrap;
    }

    /* ── Care card ── */
    #careCard {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: min(380px, 94vw);
      background: rgba(8,14,26,0.90);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px 22px 0 0;
      padding: 24px 22px 44px;
      z-index: 100;
      transition: transform 0.55s cubic-bezier(0.34,1.20,0.64,1);
      box-shadow: 0 -6px 50px rgba(0,0,0,0.60);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #careCard.hidden { transform: translateX(-50%) translateY(110%); }
    #careStatus { text-align: center; margin-bottom: 20px; }
    #careEmoji  { font-size: 42px; display: block; margin-bottom: 8px; line-height: 1; }
    #careMsg    { color: rgba(255,255,255,0.92); font-size: 16px; font-weight: 500; margin-bottom: 5px; }
    #careDay    { color: rgba(255,255,255,0.42); font-size: 12px; margin-bottom: 14px; letter-spacing: 0.03em; }
    #healthBarWrap {
      width: 70%; height: 7px; background: rgba(255,255,255,0.10);
      border-radius: 4px; margin: 0 auto; overflow: hidden;
    }
    #healthFill {
      height: 100%; border-radius: 4px;
      transition: width 1.4s ease, background 1.4s ease;
    }
    #careButtons { display: flex; justify-content: center; }
    #btnLove {
      padding: 14px 48px;
      border: none; border-radius: 50px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #ff6b9d, #ff9f0a, #ffd60a);
      color: #1a0400;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 24px rgba(255,100,100,0.30);
      transition: transform 0.12s, opacity 0.35s, box-shadow 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    #btnLove:active { transform: scale(0.93); }
    #btnLove.done   { opacity: 0.30; pointer-events: none; box-shadow: none; }
    #careClose {
      position: absolute; top: 14px; right: 16px;
      background: rgba(255,255,255,0.09); border: none;
      color: rgba(255,255,255,0.50); font-size: 14px;
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Health badge (top right) ── */
    #healthBadge {
      position: fixed; top: 16px; right: 16px;
      display: flex; align-items: center; gap: 7px;
      background: rgba(0,0,0,0.30);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 6px 12px 6px 8px;
      z-index: 10; pointer-events: none;
    }
    #badgeEmoji { font-size: 16px; line-height: 1; }
    #badgeBar {
      width: 46px; height: 5px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px; overflow: hidden;
    }
    #badgeFill {
      height: 100%; border-radius: 3px;
      transition: width 1.4s ease, background 1.4s ease;
    }

    /* ── Streak badge (top left) ── */
    #streakBadge {
      position: fixed; top: 16px; left: 16px;
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.30);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 6px 12px 6px 10px;
      z-index: 10; pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #streakBadge .sb-streak {
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.92); letter-spacing: 0.02em;
    }
    #streakBadge .sb-deaths {
      font-size: 11px; color: rgba(255,255,255,0.38);
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 8px; letter-spacing: 0.02em;
    }

    /* ── Streak row inside care card ── */
    #streakRow {
      display: flex; justify-content: center; gap: 24px;
      margin: 14px 0 18px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .streak-stat { text-align: center; }
    .streak-stat .ss-val {
      display: block; font-size: 26px; font-weight: 800;
      color: rgba(255,255,255,0.92); line-height: 1;
    }
    .streak-stat .ss-label {
      font-size: 11px; color: rgba(255,255,255,0.38);
      letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px;
    }

    /* ── Hint ── */
    .hint {
      position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-size: 13px; letter-spacing: .12em;
      font-family: -apple-system,BlinkMacSystemFont,sans-serif;
      text-align: center; pointer-events: none; z-index: 6;
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.85}}
  </style>
</head>
<body>

  <div id="stars"></div>
  <div id="celestial"></div>

  <!-- Volumetric SVG clouds -->
  <svg id="c1" class="cloud" style="top:7%;left:2%;" width="230" height="82" viewBox="0 0 230 82" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="cf1f" x="-6%" y="-25%" width="115%" height="160%">
        <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="rgba(0,20,80,0.13)"/>
      </filter>
      <linearGradient id="cg1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0.97)"/>
        <stop offset="100%" stop-color="rgba(210,225,248,0.82)"/>
      </linearGradient>
    </defs>
    <g fill="url(#cg1)" filter="url(#cf1f)">
      <ellipse cx="58" cy="62" rx="54" ry="28"/>
      <ellipse cx="102" cy="45" rx="52" ry="40"/>
      <ellipse cx="154" cy="54" rx="48" ry="30"/>
      <ellipse cx="198" cy="63" rx="32" ry="22"/>
      <ellipse cx="126" cy="36" rx="34" ry="26"/>
    </g>
  </svg>

  <svg id="c2" class="cloud" style="top:12%;left:57%;opacity:0.88;" width="178" height="68" viewBox="0 0 178 68" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="cf2f" x="-6%" y="-25%" width="115%" height="160%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,20,80,0.11)"/>
      </filter>
      <linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0.94)"/>
        <stop offset="100%" stop-color="rgba(215,228,252,0.78)"/>
      </linearGradient>
    </defs>
    <g fill="url(#cg2)" filter="url(#cf2f)">
      <ellipse cx="46" cy="52" rx="44" ry="24"/>
      <ellipse cx="86" cy="37" rx="44" ry="32"/>
      <ellipse cx="134" cy="48" rx="40" ry="24"/>
      <ellipse cx="163" cy="56" rx="24" ry="16"/>
    </g>
  </svg>

  <svg id="c3" class="cloud" style="top:5%;left:35%;opacity:0.58;" width="138" height="52" viewBox="0 0 138 52" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="cf3f" x="-6%" y="-25%" width="115%" height="160%">
        <feGaussianBlur stdDeviation="1.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="cg3" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0.90)"/>
        <stop offset="100%" stop-color="rgba(222,234,255,0.72)"/>
      </linearGradient>
    </defs>
    <g fill="url(#cg3)" filter="url(#cf3f)">
      <ellipse cx="32" cy="40" rx="30" ry="16"/>
      <ellipse cx="64" cy="28" rx="34" ry="24"/>
      <ellipse cx="100" cy="36" rx="30" ry="18"/>
      <ellipse cx="122" cy="42" rx="20" ry="13"/>
    </g>
  </svg>

  <!-- Horizon glow (positioned near sun/moon) -->
  <div id="horizonGlow"></div>

  <!-- Milky Way (night only) -->
  <div id="milkyWay">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="mwf"><feGaussianBlur stdDeviation="14"/></filter>
        <linearGradient id="mwg" x1="20%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%"   stop-color="rgba(180,195,255,0)"/>
          <stop offset="30%"  stop-color="rgba(190,205,255,0.06)"/>
          <stop offset="50%"  stop-color="rgba(205,215,255,0.11)"/>
          <stop offset="70%"  stop-color="rgba(190,205,255,0.06)"/>
          <stop offset="100%" stop-color="rgba(180,195,255,0)"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="100%" height="100%"
            fill="url(#mwg)" filter="url(#mwf)"/>
    </svg>
  </div>

  <!-- Distant rolling hills -->
  <div class="hills"></div>

  <div class="meadow"></div>
  <div class="grass-fringe"></div>

  <div id="flowerPivot">
    <div class="flower-wrap" id="mainFlower">
      <img class="sf-photo" src="sunflower-photo.webp" alt="sunflower"/>
    </div>
  </div>

  <!-- Care card -->
  <div id="careCard" class="hidden">
    <button id="careClose">✕</button>
    <div id="careStatus">
      <span id="careEmoji">🌻</span>
      <div id="careMsg">Checking plant health…</div>
      <div id="careDay"></div>
      <div id="healthBarWrap"><div id="healthFill"></div></div>
    </div>
    <!-- Streak stats -->
    <div id="streakRow">
      <div class="streak-stat">
        <span class="ss-val" id="cardStreak">0</span>
        <span class="ss-label">🔥 streak</span>
      </div>
      <div class="streak-stat">
        <span class="ss-val" id="cardDeaths">0</span>
        <span class="ss-label">💀 deaths</span>
      </div>
    </div>
    <div id="careButtons">
      <button id="btnLove">💛 Show Love</button>
    </div>
  </div>

  <!-- Streak badge (top left) -->
  <div id="streakBadge">
    <span class="sb-streak">🔥 <span id="badgeStreak">0</span></span>
    <span class="sb-deaths">💀 <span id="badgeDeaths">0</span></span>
  </div>

  <!-- Health badge (top right) -->
  <div id="healthBadge">
    <span id="badgeEmoji">🌻</span>
    <div id="badgeBar"><div id="badgeFill"></div></div>
  </div>

  <div class="hint">tap anywhere to bloom ✦</div>

<script>
/* ══════════════════════════════════════════
   SKY SYSTEM — time-based sun/moon/stars/bg
══════════════════════════════════════════ */

// Sky gradient states keyed by hour (0-23)
// Each entry: [top, upper, mid-upper, mid, mid-lower, lower, bottom]
const SKY = [
  // 0h deep night
  { h:0,  g:'linear-gradient(180deg,#000206 0%,#010408 14%,#030918 30%,#040b1e 50%,#040918 68%,#060808 84%,#050606 100%)' },
  // 4h pre-dawn chill
  { h:4,  g:'linear-gradient(180deg,#000206 0%,#030816 10%,#0a1428 24%,#12122a 42%,#200e28 58%,#2a1018 74%,#140a0c 90%,#0a0808 100%)' },
  // 5h pre-dawn warm
  { h:5,  g:'linear-gradient(180deg,#010308 0%,#070c1c 10%,#0e1630 22%,#1a1432 36%,#2e1230 50%,#421428 62%,#320e14 76%,#1c0a0a 90%,#0c0808 100%)' },
  // 6h sunrise burst
  { h:6,  g:'linear-gradient(180deg,#0b0e22 0%,#181c40 8%,#30204e 16%,#622a50 26%,#c03840 38%,#e86030 50%,#f09030 62%,#e87828 74%,#a04c10 86%,#4a2208 94%,#2a1406 100%)' },
  // 7h early glow
  { h:7,  g:'linear-gradient(180deg,#0a1428 0%,#144e90 10%,#2278c0 22%,#50a8e0 36%,#88caf5 50%,#c0e2fa 60%,#f0e8c8 68%,#f0c050 76%,#c87820 86%,#5a3010 95%,#2a1408 100%)' },
  // 9h morning blue
  { h:9,  g:'linear-gradient(180deg,#081630 0%,#1252a0 10%,#2488d0 24%,#58b8f0 40%,#94d4fc 54%,#c8eaff 64%,#e8f4ff 72%,#fef0d0 78%,#e8a838 84%,#3d1e05 100%)' },
  // 12h noon vivid
  { h:12, g:'linear-gradient(180deg,#060e28 0%,#0e54b0 10%,#2290dc 24%,#54bcf5 40%,#8ed4fc 54%,#c2ecff 64%,#def6ff 72%,#f5f0e8 78%,#3d1e05 100%)' },
  // 15h afternoon
  { h:15, g:'linear-gradient(180deg,#091630 0%,#184c90 10%,#2c84c8 24%,#5cb4e8 40%,#a8d4f0 54%,#d8eef8 62%,#f0e8d0 70%,#e8c060 78%,#c07820 86%,#3d1e05 100%)' },
  // 17h golden hour
  { h:17, g:'linear-gradient(180deg,#08101e 0%,#141e38 8%,#203050 18%,#3a6090 30%,#d8b060 44%,#f0c038 56%,#f09820 66%,#d06c18 76%,#903c0e 88%,#3d1e05 100%)' },
  // 18h sunset fire
  { h:18, g:'linear-gradient(180deg,#060810 0%,#0e1020 8%,#1a1028 18%,#3c1a20 28%,#b02c18 40%,#e04c18 52%,#f07018 62%,#c85010 74%,#7a2c0a 88%,#3a1206 100%)' },
  // 19h dusk fade
  { h:19, g:'linear-gradient(180deg,#030508 0%,#06080e 10%,#0a081e 20%,#120a1e 32%,#1a0c18 46%,#140a0e 60%,#0e0808 76%,#080606 92%,#060504 100%)' },
  // 21h settled night
  { h:21, g:'linear-gradient(180deg,#000206 0%,#010408 14%,#030918 30%,#040b1e 50%,#040918 68%,#060808 84%,#050606 100%)' },
];

function getSkyGradient(h) {
  // find surrounding keyframes
  for (let i = SKY.length - 1; i >= 0; i--) {
    if (h >= SKY[i].h) {
      const next = SKY[(i + 1) % SKY.length];
      const a = SKY[i], b = next;
      // just snap to nearest (CSS transition handles smooth)
      const mid = a.h + (((b.h - a.h) + 24) % 24) / 2;
      const hNorm = ((h - a.h) + 24) % 24;
      const span  = ((b.h - a.h) + 24) % 24;
      return hNorm < span / 2 ? a.g : b.g;
    }
  }
  return SKY[0].g;
}

function updateSky() {
  const now = new Date();
  const h   = now.getHours() + now.getMinutes() / 60;
  const W   = window.innerWidth,  H = window.innerHeight;
  const horizonY = H * 0.72;
  const arcRX    = W * 0.40,  arcRY = H * 0.52;
  const cX       = W / 2;

  const RISE = 6, SET = 18;
  const isDay = h >= RISE && h <= SET;

  // ── background ──────────────────────────
  document.body.style.background = getSkyGradient(h);

  // ── clouds: fade out at night ────────────
  const cloudOp = (h >= 5.5 && h <= 19) ? 1 : 0;
  ['c1','c2','c3'].forEach(id => {
    document.getElementById(id).style.opacity = cloudOp;
  });

  const cel    = document.getElementById('celestial');
  const stEl   = document.getElementById('stars');
  const glowEl = document.getElementById('horizonGlow');
  const mwEl   = document.getElementById('milkyWay');

  if (isDay) {
    // sun arc: left (6am) → top (noon) → right (6pm)
    const t     = (h - RISE) / (SET - RISE);
    const angle = Math.PI * (1 - t);
    const sx    = cX + arcRX * Math.cos(angle);
    const sy    = horizonY - arcRY * Math.sin(angle);

    cel.style.left    = (sx - 38) + 'px';
    cel.style.top     = (sy - 38) + 'px';
    cel.style.opacity = '1';
    cel.innerHTML     = sunHTML();

    stEl.style.opacity = '0';
    mwEl.style.opacity = '0';

    // Horizon glow — brightest near dawn/dusk, warm orange
    const nearHorizon = Math.pow(1 - Math.abs(2 * t - 1), 2.5);
    const gAlpha = (0.28 * nearHorizon + 0.04).toFixed(2);
    const gColor = t < 0.5 ? `255,148,48` : `255,110,38`;
    const sx_p   = (sx / W * 100).toFixed(1);
    glowEl.style.background =
      `radial-gradient(ellipse 58% 220px at ${sx_p}% 100%, rgba(${gColor},${gAlpha}) 0%, transparent 72%)`;

  } else {
    // moon arc: right (6pm) → top (midnight) → left (6am)
    const nightSpan = (24 - SET) + RISE;
    const nt    = h >= SET ? (h - SET) / nightSpan : (h + 24 - SET) / nightSpan;
    const angle = Math.PI * nt;
    const mx    = cX + arcRX * Math.cos(angle);
    const my    = horizonY - arcRY * Math.sin(angle);

    cel.style.left    = (mx - 40) + 'px';
    cel.style.top     = (my - 40) + 'px';
    cel.style.opacity = '1';
    cel.innerHTML     = moonHTML();

    if (!stEl.dataset.built) {
      stEl.innerHTML     = buildStars(W, H * 0.65);
      stEl.dataset.built = '1';
    }
    stEl.style.opacity = '1';

    // Milky Way — visible deep night
    mwEl.style.opacity = (h > 21 || h < 4) ? '1' : '0.5';

    // Soft moonlit glow on horizon
    const mx_p = (mx / W * 100).toFixed(1);
    glowEl.style.background =
      `radial-gradient(ellipse 42% 170px at ${mx_p}% 100%, rgba(170,195,240,0.08) 0%, transparent 70%)`;
  }

  if (isDay) stEl.dataset.built = '';
}

function sunHTML() {
  return `<div style="width:76px;height:76px;border-radius:50%;
    background:radial-gradient(circle at 36% 34%,
      #fffef0 0%,#ffe566 28%,#ffa500 65%,#ff6800 100%);
    box-shadow:0 0 0 10px rgba(255,230,80,0.18),
               0 0 50px 20px rgba(255,210,60,0.38),
               0 0 110px 50px rgba(255,160,0,0.18);"></div>`;
}

function moonHTML() {
  return `<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="mg"><feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <mask id="cm">
        <rect width="80" height="80" fill="white"/>
        <circle cx="52" cy="34" r="26" fill="black"/>
      </mask>
    </defs>
    <!-- soft halo -->
    <circle cx="36" cy="40" r="32" fill="rgba(210,210,180,0.10)" filter="url(#mg)"/>
    <!-- crescent body -->
    <circle cx="36" cy="40" r="28" fill="#e8e4cc" mask="url(#cm)" filter="url(#mg)"/>
    <!-- craters -->
    <circle cx="27" cy="36" r="3.5" fill="rgba(150,145,125,0.45)" mask="url(#cm)"/>
    <circle cx="38" cy="51" r="2.5" fill="rgba(150,145,125,0.35)" mask="url(#cm)"/>
    <circle cx="23" cy="49" r="2"   fill="rgba(150,145,125,0.30)" mask="url(#cm)"/>
    <circle cx="32" cy="26" r="2"   fill="rgba(150,145,125,0.30)" mask="url(#cm)"/>
  </svg>`;
}

function buildStars(W, maxY) {
  let s = `<svg width="${W}" height="${maxY}" xmlns="http://www.w3.org/2000/svg">`;
  for (let i = 0; i < 90; i++) {
    const x   = (Math.random() * W).toFixed(1);
    const y   = (Math.random() * maxY).toFixed(1);
    const r   = (0.5 + Math.random() * 1.6).toFixed(1);
    const op  = (0.4 + Math.random() * 0.6).toFixed(2);
    const dur = (2 + Math.random() * 4).toFixed(1);
    s += `<circle cx="${x}" cy="${y}" r="${r}" fill="white" opacity="${op}">
      <animate attributeName="opacity"
        values="${op};${(op*0.25).toFixed(2)};${op}"
        dur="${dur}s" repeatCount="indefinite"/>
    </circle>`;
  }
  return s + '</svg>';
}

updateSky();
setInterval(updateSky, 30000);


/* ══════════════════════════════════════════
   TAP SHOWER
══════════════════════════════════════════ */
const GA = 137.508 * (Math.PI / 180);
let busy = false;
function onTap(ox, oy) {
  if (busy) return;
  busy = true;
  setTimeout(() => { busy = false; }, 180);

  // Scale shower intensity with plant health
  const vigor  = computeHealth(loadState()) / 100; // 0.0 → 1.0
  const flowers = Math.max(1, Math.round(vigor * 24));
  const texts   = Math.max(0, Math.round(vigor * (5 + Math.floor(Math.random() * 4))));

  for (let i = 0; i < flowers; i++)
    setTimeout(() => spawnMini(ox, oy), i*55 + Math.random()*25);
  for (let i = 0; i < texts; i++)
    setTimeout(() => spawnText(ox, oy), i*90 + Math.random()*50);
}

document.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0]; onTap(t.clientX, t.clientY);
}, { passive: false });
document.addEventListener('click', e => onTap(e.clientX, e.clientY));

/* ══════════════════════════════════════════
   PLANT CARE SYSTEM
══════════════════════════════════════════ */
const PLANT_KEY = 'sf_plant_v2';

// All timestamps stored as ms (Date.now())
function loadState()  { try { return JSON.parse(localStorage.getItem(PLANT_KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { localStorage.setItem(PLANT_KEY, JSON.stringify(s)); }

const SLEEP_START = 0, SLEEP_END = 7; // midnight → 7am

function isSleepTime() {
  const h = new Date().getHours();
  return h >= SLEEP_START && h < SLEEP_END;
}

// Hours since ts, NOT counting the midnight–7am sleep window
function awakeHoursSince(ts) {
  if (!ts || typeof ts !== 'number') return 999;
  const now = Date.now();
  const totalMs = Math.max(0, now - ts);
  // Walk day boundaries between ts and now, summing sleep-window overlap
  let sleepMs = 0;
  let d = new Date(ts);
  d.setHours(0, 0, 0, 0); // start of day containing ts
  while (d.getTime() < now) {
    const winStart = d.getTime() + SLEEP_START * 3600000;
    const winEnd   = d.getTime() + SLEEP_END   * 3600000;
    const oStart   = Math.max(ts,  winStart);
    const oEnd     = Math.min(now, winEnd);
    if (oEnd > oStart) sleepMs += oEnd - oStart;
    d.setDate(d.getDate() + 1);
  }
  return Math.max(0, (totalMs - sleepMs) / 3600000);
}

function canCare(state) {
  if (isSleepTime()) return false;
  return awakeHoursSince(state.lastCared) >= 1;
}

function computeHealth(state) {
  return Math.round(Math.max(0, 100 - awakeHoursSince(state.lastCared) * 18));
}

function healthLabel(health) {
  if (health >= 80) return ['🌻', 'Thriving beautifully!'];
  if (health >= 60) return ['💛', 'Needs some water soon'];
  if (health >= 40) return ['🧡', 'Getting thirsty…'];
  if (health >= 20) return ['😢', 'Please water me!'];
  if (health >= 5)  return ['🥀', 'Wilting badly…'];
  return ['💀', 'Dying… rescue me!'];
}

function careStatusText(state) {
  if (isSleepTime()) return 'Resting 😴  •  back at 7am';
  if (!state.lastCared) return 'Needs your love 🌱';
  const mins = Math.round((Date.now() - state.lastCared) / 60000);
  if (mins < 1)  return 'Loved just now ✓';
  if (mins < 60) return `Loved ${mins} min ago ✓`;
  const hrs = Math.floor(mins / 60);
  return `No love for ${hrs} hour${hrs > 1 ? 's' : ''}`;
}

function applyPlantVisuals(health) {
  const pivot = document.getElementById('flowerPivot');
  const img   = document.querySelector('.sf-photo');
  const wrap  = document.querySelector('.flower-wrap');
  let droop, filter, animDur;
  if      (health >= 80) { droop=0;  animDur='2.6s'; filter='drop-shadow(0 12px 28px rgba(0,0,0,0.30))'; }
  else if (health >= 60) { droop=7;  animDur='3.2s'; filter='drop-shadow(0 10px 24px rgba(0,0,0,0.28)) sepia(18%) brightness(0.97)'; }
  else if (health >= 40) { droop=16; animDur='4.4s'; filter='drop-shadow(0 8px 20px rgba(0,0,0,0.24)) sepia(40%) brightness(0.87) saturate(0.80)'; }
  else if (health >= 20) { droop=28; animDur='6s';   filter='drop-shadow(0 6px 14px rgba(0,0,0,0.20)) sepia(62%) brightness(0.75) saturate(0.60)'; }
  else if (health >= 5)  { droop=42; animDur='9s';   filter='drop-shadow(0 4px 10px rgba(0,0,0,0.18)) sepia(82%) brightness(0.58) saturate(0.40)'; }
  else                   { droop=58; animDur='15s';  filter='drop-shadow(0 3px 8px rgba(0,0,0,0.15)) sepia(98%) brightness(0.42) saturate(0.20) grayscale(0.4)'; }
  pivot.style.transform        = `translateX(-50%) rotate(${droop}deg)`;
  img.style.filter             = filter;
  wrap.style.animationDuration = animDur;
}

// Record a death if health just hit 0 and streak was > 0
function checkDeath(state) {
  if (computeHealth(state) === 0 && (state.streak || 0) > 0) {
    state.deaths = (state.deaths || 0) + 1;
    state.streak = 0;
    saveState(state);
  }
}

function updateCareUI(state) {
  const health = computeHealth(state);
  const [emoji, msg] = healthLabel(health);
  document.getElementById('careEmoji').textContent = emoji;
  document.getElementById('careMsg').textContent   = msg;
  document.getElementById('careDay').textContent   = careStatusText(state);
  const hue = Math.round(health * 1.2);
  const fillStyle = `width:${health}%; background:hsl(${hue},72%,52%);`;
  document.getElementById('healthFill').style.cssText  = fillStyle;
  document.getElementById('badgeFill').style.cssText   = fillStyle;
  document.getElementById('badgeEmoji').textContent    = emoji;
  const done = !canCare(state);
  document.getElementById('btnLove').classList.toggle('done', done);
  document.getElementById('btnLove').disabled = done;
  // Streak & deaths
  const streak = state.streak  || 0;
  const deaths = state.deaths  || 0;
  document.getElementById('cardStreak').textContent  = streak;
  document.getElementById('cardDeaths').textContent  = deaths;
  document.getElementById('badgeStreak').textContent = streak;
  document.getElementById('badgeDeaths').textContent = deaths;
  applyPlantVisuals(health);
}

function showCareCard() { document.getElementById('careCard').classList.remove('hidden'); }
function hideCareCard() { document.getElementById('careCard').classList.add('hidden'); }

/* Watering: blue droplets fall on the flower */
function animateWater() {
  const r   = document.getElementById('flowerPivot').getBoundingClientRect();
  const cx  = r.left + r.width / 2, cy = r.top + 30;
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const d = document.createElement('div');
      const dur = (0.7 + Math.random() * 0.6).toFixed(2);
      d.style.cssText = [
        `position:fixed`,
        `left:${cx + (Math.random()-0.5)*90}px`,
        `top:${cy - 10}px`,
        `width:8px`, `height:13px`,
        `border-radius:50% 50% 58% 58%`,
        `background:radial-gradient(circle at 38% 28%,rgba(170,230,255,0.95),rgba(20,130,255,0.78))`,
        `pointer-events:none`, `z-index:1000`,
        `--dx:${(Math.random()-0.5)*44}px`,
        `--dy:${70+Math.random()*90}px`,
        `--dr:${(Math.random()-0.5)*25}deg`,
        `--dur:${dur}s`,
        `animation:fall ${dur}s cubic-bezier(0.3,0,0.8,1) forwards`
      ].join(';');
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 1800);
    }, i * 55 + Math.random() * 30);
  }
}

/* Minerals: gold sparkles bloom around flower */
function animateMineral() {
  const r  = document.getElementById('flowerPivot').getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height * 0.4;
  const glyphs = ['✦','★','✧','⊹','✵','✴'];
  const colors = ['#FFD700','#FFC300','#FFEC80','#FFB830'];
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const d     = document.createElement('div');
      const angle = Math.random() * Math.PI * 2;
      const dist  = 35 + Math.random() * 85;
      const dur   = (1.2 + Math.random() * 1.1).toFixed(2);
      d.style.cssText = [
        `position:fixed`,
        `left:${cx + Math.cos(angle)*dist - 6}px`,
        `top:${cy + Math.sin(angle)*dist - 6}px`,
        `font-size:${11+Math.random()*8}px`,
        `color:${colors[Math.floor(Math.random()*colors.length)]}`,
        `text-shadow:0 0 10px rgba(255,210,0,0.85)`,
        `pointer-events:none`, `z-index:1000`,
        `--dx:${(Math.random()-0.5)*70}px`,
        `--dy:-${55+Math.random()*90}px`,
        `--dr:${(Math.random()-0.5)*35}deg`,
        `--dur:${dur}s`,
        `animation:floatUp ${dur}s ease-out forwards`
      ].join(';');
      d.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 2600);
    }, i * 50 + Math.random() * 30);
  }
}

/* ── Init ───────────────────────────────── */
const plantState = loadState();
checkDeath(plantState);
updateCareUI(plantState);

if (canCare(plantState))
  setTimeout(showCareCard, 1200);

// Refresh every minute — update status + auto-show card + check death
setInterval(() => {
  const s = loadState();
  checkDeath(s);
  updateCareUI(s);
  if (canCare(s)) showCareCard();
}, 60000);

// Stop care card taps from triggering the flower shower
document.getElementById('careCard').addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
document.getElementById('careCard').addEventListener('click',      e => e.stopPropagation());

document.getElementById('btnLove').addEventListener('click', () => {
  if (!canCare(plantState)) return;
  // Increment streak only if plant is alive
  if (computeHealth(plantState) > 0) {
    plantState.streak = (plantState.streak || 0) + 1;
  }
  plantState.lastCared = Date.now();
  saveState(plantState);
  hideCareCard();
  animateWater();
  setTimeout(animateMineral, 300);
  setTimeout(() => updateCareUI(plantState), 400);
});

document.getElementById('careClose').addEventListener('click', hideCareCard);

function miniSVG(s) {
  const mPetal = (len,bw,hw) => `M -${bw} 0 C -${hw} -${(len*.22).toFixed(1)}, -${(hw*.94).toFixed(1)} -${(len*.54).toFixed(1)}, 0 -${len} C ${(hw*.94).toFixed(1)} -${(len*.54).toFixed(1)}, ${hw} -${(len*.22).toFixed(1)}, ${bw} 0 Z`;
  let p = '';
  for (let i=0;i<14;i++) p+=`<g transform="translate(50 50) rotate(${i*(360/14)})"><path d="${mPetal(38,3.5,10)}" fill="#FFD700" opacity="0.95"/></g>`;
  for (let i=0;i<14;i++) p+=`<g transform="translate(50 50) rotate(${i*(360/14)+(360/28)})"><path d="${mPetal(28,2.5,7.5)}" fill="#E89500" opacity="0.85"/></g>`;
  let seeds = '';
  for (let i=0;i<35;i++){
    const r=2.8*Math.sqrt(i); if(r>16) continue;
    const theta=i*GA;
    seeds+=`<ellipse cx="${(50+r*Math.cos(theta)).toFixed(1)}" cy="${(50+r*Math.sin(theta)).toFixed(1)}" rx="1.5" ry="2" fill="#060200" opacity="0.9"/>`;
  }
  return `<svg width="${s}" height="${s}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    ${p}<circle cx="50" cy="50" r="21" fill="#5a2d0a"/><circle cx="50" cy="50" r="17" fill="#7a4010"/>${seeds}
  </svg>`;
}
